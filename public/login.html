<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini独家KK代理商 - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff2a6d;
            --neon-blue: #05d9e8;
            --neon-purple: #d300c5;
            --dark-bg: #0d0221;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Orbitron', sans-serif;
            background-color: var(--dark-bg);
            color: var(--neon-blue);
            position: relative;
            overflow: hidden;
        }

        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('bg.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(0.5);
            z-index: -1;
        }

        .login-container {
            background: rgba(13, 2, 33, 0.7);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 
                0 0 20px var(--neon-blue),
                0 0 40px rgba(5, 217, 232, 0.5);
            position: relative;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-pink), var(--neon-purple));
            animation: borderFlow 2s linear infinite;
        }

        @keyframes borderFlow {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        h1 {
            color: var(--neon-pink);
            text-shadow: 
                0 0 5px var(--neon-pink),
                0 0 10px var(--neon-pink),
                0 0 20px var(--neon-pink);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2em;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .cyber-line {
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                var(--neon-blue),
                var(--neon-pink),
                var(--neon-purple),
                var(--neon-blue),
                transparent
            );
            margin: 20px auto;
            max-width: 100%;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--neon-pink);
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        input {
            background: rgba(13, 2, 33, 0.7);
            border: 1px solid var(--neon-purple);
            color: var(--neon-blue);
            padding: 15px;
            width: 100%;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            box-sizing: border-box;
            font-size: 1em;
            letter-spacing: 1px;
        }

        input:focus {
            outline: none;
            border-color: var(--neon-pink);
            box-shadow: 0 0 15px var(--neon-pink);
        }

        button {
            background: transparent;
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            font-family: 'Orbitron', sans-serif;
            position: relative;
            overflow: hidden;
            font-size: 1em;
            margin-top: 10px;
            border-radius: 4px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(5, 217, 232, 0.4),
                transparent
            );
            transition: 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: rgba(5, 217, 232, 0.2);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-blue);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .error-message {
            background: rgba(255, 42, 109, 0.2);
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        /* Loading spinner */
        .loader {
            border: 3px solid rgba(5, 217, 232, 0.3);
            border-top: 3px solid var(--neon-blue);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px var(--neon-blue); }
            50% { text-shadow: 0 0 20px var(--neon-pink); }
            100% { text-shadow: 0 0 5px var(--neon-blue); }
        }

        .glow-text {
            animation: glow 2s infinite;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            max-width: 120px;
            height: auto;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            box-shadow: 
                0 0 10px var(--neon-blue),
                0 0 20px rgba(5, 217, 232, 0.5);
            padding: 5px;
            background: rgba(13, 2, 33, 0.5);
        }

        .cyber-decoration {
            position: fixed;
            pointer-events: none;
            z-index: -1;
        }

        .cyber-circle {
            position: fixed;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid var(--neon-pink);
            box-shadow: 0 0 30px var(--neon-pink);
            opacity: 0.2;
            top: -150px;
            left: -150px;
        }

        .cyber-circle:nth-child(2) {
            width: 200px;
            height: 200px;
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px var(--neon-blue);
            bottom: -100px;
            right: -100px;
            top: auto;
            left: auto;
        }
    </style>
</head>
<body>
    <!-- 背景图片 -->
    <div class="bg-image"></div>
    
    <!-- 装饰元素 -->
    <div class="cyber-decoration cyber-circle"></div>
    <div class="cyber-decoration cyber-circle"></div>

    <div class="login-container">
        <div class="logo-container">
            <!-- 在这里放置您的图片 -->
            <img class="logo" src="your_logo.png" alt="Gemini Logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%230d0221%22 stroke=%22%2305d9e8%22 stroke-width=%222%22/><text x=%2250%%22 y=%2250%%22 font-family=%22Arial%22 font-size=%2220%22 fill=%22%23ff2a6d%22 text-anchor=%22middle%22 dominant-baseline=%22middle%22>G</text></svg>'">
        </div>

        <h1 class="glow-text">Gemini独家KK代理商</h1>
        <div class="cyber-line"></div>
        
        <!-- Error Message Area -->
        <div id="error-message" class="error-message">
            <span id="error-text"></span>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="password">管理员密码</label>
                <input type="password" id="password" name="password" required placeholder="输入管理员密码">
            </div>

            <button type="submit" id="login-button">
                登录
                <div id="loading-spinner" class="loader hidden"></div>
            </button>
        </form>
    </div>

    <script src="login.script.js"></script>
</body>
</html>
